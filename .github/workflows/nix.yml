name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Classify PR changed files
        id: changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function isDocsOnlyPath(filename) {
              if ([
                'AGENTS.md',
                'GOAL.md',
                'README.md',
                'CHANGELOG.md',
                'CONTRIBUTING.md',
              ].includes(filename)) {
                return true;
              }
              return /^(docs|website|skills|optional-skills)\/.*\.(md|mdx)$/.test(filename);
            }

            function isDocsOnlyFileChange(file) {
              return isDocsOnlyPath(file.filename) &&
                (!file.previous_filename || isDocsOnlyPath(file.previous_filename));
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const payload = files.map(({ filename, status, previous_filename, patch }) => ({
              filename,
              status,
              previous_filename: previous_filename || null,
              patch: patch || null,
            }));
            const docsOnly = files.length > 0 && files.every((file) => isDocsOnlyFileChange(file));
            const outPath = path.join(process.env.RUNNER_TEMP, 'changed-files.json');
            fs.writeFileSync(outPath, `${JSON.stringify(payload, null, 2)}\n`);

            core.setOutput('docs_only', docsOnly ? 'true' : 'false');
            core.setOutput('json_path', outPath);
            core.setOutput('count', String(files.length));
            core.info(`Changed files: ${files.length}`);
            core.info(`Docs-only: ${docsOnly}`);
            await core.summary
              .addHeading('PR change classification')
              .addRaw(`Docs-only: ${docsOnly ? 'yes' : 'no'}\n\n`)
              .addCodeBlock(files.map((file) => `${file.status}\t${file.filename}`).join('\n') || '(none)')
              .write();

      - name: Docs-only governance gate
        if: steps.changes.outputs.docs_only == 'true' && runner.os == 'Linux'
        shell: bash
        env:
          CHANGED_FILES_JSON: ${{ steps.changes.outputs.json_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import sys

          changed_path = os.environ['CHANGED_FILES_JSON']
          files = json.loads(pathlib.Path(changed_path).read_text())

          def is_docs_only_path(filename: str) -> bool:
              if filename in {
                  'AGENTS.md',
                  'GOAL.md',
                  'README.md',
                  'CHANGELOG.md',
                  'CONTRIBUTING.md',
              }:
                  return True
              return re.match(r'^(docs|website|skills|optional-skills)/.*\.(md|mdx)$', filename) is not None

          def is_docs_only_change(item: dict) -> bool:
              return is_docs_only_path(item['filename']) and (
                  not item.get('previous_filename') or is_docs_only_path(item['previous_filename'])
              )

          bad_paths = [
              f"{item.get('previous_filename') or item['filename']} -> {item['filename']}"
              for item in files
              if not is_docs_only_change(item)
          ]
          if bad_paths:
              print('::error::Docs-only fast path received non-doc paths:')
              for filename in bad_paths:
                  print(f'::error::{filename}')
              sys.exit(1)

          secret_patterns = [
              ('openai_key', re.compile(r'\bsk-[A-Za-z0-9_-]{20,}\b')),
              ('github_pat', re.compile(r'\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{20,}\b')),
              ('google_api_key', re.compile(r'\bAIza[0-9A-Za-z_-]{30,}\b')),
              ('aws_access_key', re.compile(r'\bAKIA[0-9A-Z]{16}\b')),
              ('private_key', re.compile(r'-----BEGIN (?:RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----')),
              ('bearer_token', re.compile(r'\bBearer\s+[A-Za-z0-9._~+/=-]{20,}\b')),
              ('assignment_secret', re.compile(r'(?i)\b(api[_-]?key|secret|token|password)\b\s*[:=]\s*[\'\"]?[A-Za-z0-9_./+=-]{16,}')),
          ]

          added_lines = []
          for item in files:
              patch = item.get('patch')
              if patch:
                  for line in patch.splitlines():
                      if line.startswith('+') and not line.startswith('+++'):
                          added_lines.append((item['filename'], line[1:]))
                  continue

              # GitHub omits patches for very large files. Fail safe by scanning the checked-out file.
              text = pathlib.Path(item['filename']).read_text(encoding='utf-8', errors='ignore')
              for line_number, line in enumerate(text.splitlines(), 1):
                  added_lines.append((f"{item['filename']}:{line_number}", line))

          findings = []
          for location, line in added_lines:
              for name, pattern in secret_patterns:
                  if pattern.search(line):
                      findings.append((location, name))

          if findings:
              print('::error::Secret-shaped literal found in docs-only added lines:')
              for location, name in findings[:50]:
                  print(f'::error::{location}: {name}')
              sys.exit(1)

          marker_requirements = {
              'AGENTS.md': [
                  'docs/roadmap/current-status.md',
                  'Roadmap Current Status Preflight',
                  'explicit non-approvals',
              ],
              'GOAL.md': [
                  'Non-negotiable principles',
                  'Explicit approvals',
              ],
              'docs/roadmap/current-status.md': [
                  'current_position:',
                  'Explicit non-approvals',
                  'real_external_sachima_ingress',
                  'gateway_restart_or_reload',
                  'public_webhook_exposure',
                  'Next allowed request',
              ],
              'docs/protocols/sachima-envelope-v1.md': [
                  'Sachima Envelope v1',
                  'Unix seconds',
                  'deprecated migration alias',
                  'SACHIMA_DELIVERY_URL',
                  '2xx',
              ],
          }

          changed_names = {item['filename'] for item in files}
          changed_names.update(item['previous_filename'] for item in files if item.get('previous_filename'))
          missing_markers = []
          for filename, markers in marker_requirements.items():
              if filename not in changed_names:
                  continue
              if not pathlib.Path(filename).exists():
                  missing_markers.append((filename, 'file exists'))
                  continue
              content = pathlib.Path(filename).read_text(encoding='utf-8', errors='ignore')
              for marker in markers:
                  if marker not in content:
                      missing_markers.append((filename, marker))

          if missing_markers:
              print('::error::Critical docs marker missing after docs-only change:')
              for filename, marker in missing_markers:
                  print(f'::error::{filename}: missing {marker!r}')
              sys.exit(1)

          print('DOCS_ONLY_GOVERNANCE_GATE_PASS')
          print(f'DOCS_ONLY_CHANGED_FILES={len(files)}')
          PY

      - name: Docs-only Nix fast path
        if: steps.changes.outputs.docs_only == 'true'
        run: |
          echo "Docs-only PR detected. Lightweight governance gate covers docs/no-leak/markers; skipping Nix flake/build matrix."

      - uses: ./.github/actions/nix-setup
        if: steps.changes.outputs.docs_only != 'true'
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Resolve head SHA
        if: github.event_name == 'pull_request'
        id: sha
        shell: bash
        run: |
          FULL="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "short=${FULL:0:7}" >> "$GITHUB_OUTPUT"

      - name: Check flake
        id: flake
        if: steps.changes.outputs.docs_only != 'true' && runner.os == 'Linux'
        continue-on-error: true
        run: nix flake check --print-build-logs

      - name: Build package
        id: build
        if: steps.changes.outputs.docs_only != 'true' && runner.os == 'Linux'
        continue-on-error: true
        run: nix build --print-build-logs

      # When the real Nix build fails, run a targeted diagnostic to see if
      # the failure is specifically a stale npm lockfile hash in one of the
      # known npm subpackages (tui / web).  This avoids surfacing a generic
      # "build failed" message when the fix is a single known command.
      - name: Diagnose npm lockfile hashes
        id: hash_check
        if: steps.changes.outputs.docs_only != 'true' && (steps.flake.outcome == 'failure' || steps.build.outcome == 'failure') && runner.os == 'Linux'
        continue-on-error: true
        env:
          LINK_SHA: ${{ steps.sha.outputs.full }}
        run: nix run .#fix-lockfiles -- --check

      # If fix-lockfiles itself crashes (infrastructure blip, cache throttle,
      # etc.) it won't set stale=true/false.  Treat that as a distinct failure
      # mode rather than silently ignoring it.
      - name: Fail if hash check crashed without reporting
        if: steps.changes.outputs.docs_only != 'true' && steps.hash_check.outcome == 'failure' && steps.hash_check.outputs.stale != 'true' && steps.hash_check.outputs.stale != 'false'
        run: |
          echo "::error::fix-lockfiles exited without reporting stale status — likely an infrastructure or script failure"
          exit 1

      - name: Post sticky PR comment (stale hashes)
        if: steps.changes.outputs.docs_only != 'true' && steps.hash_check.outputs.stale == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728  # v2.9.1
        with:
          header: nix-lockfile-check
          message: |
            ### ⚠️ npm lockfile hash out of date

            Checked against commit [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.sha.outputs.full }}) (PR head at check time).

            The `hash = "sha256-..."` line in these nix files no longer matches the committed `package-lock.json`:

            ${{ steps.hash_check.outputs.report }}

            #### Apply the fix

            - [ ] **Apply lockfile fix** — tick to push a commit with the correct hashes to this PR branch
            - Or [run the Nix Lockfile Fix workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/nix-lockfile-fix.yml) manually (pass PR `#${{ github.event.pull_request.number }}`)
            - Or locally: `nix run .#fix-lockfiles` and commit the diff

      # Clear the sticky comment when either the build passed outright (no
      # hash check needed) or the hash check explicitly returned stale=false
      # (build failed for a non-hash reason).
      - name: Clear sticky PR comment (resolved)
        if: |
          steps.changes.outputs.docs_only != 'true' &&
          github.event_name == 'pull_request' &&
          runner.os == 'Linux' &&
          (steps.hash_check.outputs.stale == 'false' ||
           (steps.flake.outcome == 'success' && steps.build.outcome == 'success'))
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728  # v2.9.1
        with:
          header: nix-lockfile-check
          delete: true

      - name: Final fail if build or flake failed
        if: steps.changes.outputs.docs_only != 'true' && (steps.flake.outcome == 'failure' || steps.build.outcome == 'failure')
        run: |
          if [ "${{ steps.hash_check.outputs.stale }}" == "true" ]; then
            echo "::error::Nix build failed due to stale npm lockfile hash. Run: nix run .#fix-lockfiles"
          else
            echo "::error::Nix build/flake check failed. See logs above."
          fi
          exit 1

      - name: Evaluate flake (macOS)
        if: steps.changes.outputs.docs_only != 'true' && runner.os == 'macOS'
        run: nix flake show --json > /dev/null
