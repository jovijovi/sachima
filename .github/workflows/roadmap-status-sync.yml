name: Roadmap status guard

on:
  workflow_dispatch:
  push:
    branches: [release/sachima]

permissions:
  contents: read

concurrency:
  group: roadmap-status-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: release/sachima

      - name: Guard current-status dashboard shape
        run: |
          set -euo pipefail
          python3 tools/sync_roadmap_status.py \
            --file docs/roadmap/current-status.md \
            --check
