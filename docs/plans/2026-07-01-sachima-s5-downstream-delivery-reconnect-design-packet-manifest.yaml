type: sachima.governance.phase_manifest.v1
phase: s5_downstream_delivery_reconnect_design_packet
status: design_candidate
title: "Sachima S5 — Downstream delivery / ACK reconnect design packet"
date: 2026-07-01

base_branch: release/sachima
branch: feat/s5-downstream-delivery-reconnect-design-packet

summary: >-
  Docs/status design packet refining a future S5 downstream delivery / ACK
  reconnect implementation. It fixes how the already-merged S4 Temporal
  Activity/controller orchestration output (sanitized ActivityOutput: one
  claim-check artifact ref + evidence, business_verdict = null, held in durable
  state) would be reconnected to the already-merged, default-off delivery/ACK
  surface (gateway/sachima_delivery_ack.py SachimaP7DeliveryAckController and the
  gateway/flowweaver_delivery_activity.py delivery-Activity pattern) through an
  INJECTED (fake) delivery-adapter seam — without making the Gateway a Temporal
  caller or lifecycle owner, without changing the claim-check data model, the
  stable ids/codes, or the no-leak boundary, and without performing any real send.
  It fixes the output->delivery request contract, the closed delivery
  intent/channel/role/permission mapping (unknown/platform-derived/write-capable/
  live-default-on fail closed), the delivery-side idempotency
  (pre-claim/post-claim/duplicate/recover/no-relaunch/ambiguous), and the
  ACK/retry/timeout/cancellation/failure semantics (Temporal behavior governed by
  https://docs.temporal.io/ as source of truth; local llm-wiki is dated synthesis
  only). Docs only: no source implementation, no Temporal Worker/runtime start, no
  real agent/acpx/npx execution by this gate, no Gateway/Feishu/live behavior, no
  platform adapter, no real send/real delivery, no production config, no write roles.

governance_markers:
  - DESIGN_ONLY
  - IMPLEMENTATION_NOT_APPROVED
  - LIVE_NOT_APPROVED
  - GATEWAY_NOT_APPROVED
  - REAL_DELIVERY_NOT_APPROVED
  - TEMPORAL_WORKER_START_NOT_APPROVED
  - REAL_AGENT_EXECUTION_NOT_APPROVED_BY_THIS_GATE
  - WRITE_ROLES_NOT_APPROVED
  - PRODUCTION_CONFIG_NOT_APPROVED

