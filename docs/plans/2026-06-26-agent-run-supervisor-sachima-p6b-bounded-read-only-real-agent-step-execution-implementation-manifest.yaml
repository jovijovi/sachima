implementation:
  summary: >-
    Adds a thin default-off P6-B bridge StepExecutor that adapts the already-merged
    one-shot controlled local exec (start_controlled_local_exec) into the unmodified
    WP4 step seam, injectable into the unmodified P6-A composition session. It builds
    no new runner, claim store, provenance gate, or prompt machine, reuses the
    existing committed null-binary read-only roles, and exercises only an injected
    fake read-only runner. No real agent, no real smoke.
  files:
    - sachima_supervisor/p6b_read_only_real_agent.py
    - sachima_supervisor/p6b_planning_report_prompt.py
    - tests/fixtures/sachima_supervisor/p6b_planning_report_prompt.v1.txt
