  no_existing_p5_temporal_symbols: true
  modules:
    - path: sachima_supervisor/p5_temporal/__init__.py
      provides: package exports + P5_TEMPORAL_*_APPROVAL_TOKEN (default-off guard)
    - path: sachima_supervisor/p5_temporal/contracts.py
      provides: frozen sanitized dataclasses (RuntimeStartPayload, update/activity I/O, QuerySnapshot)
      promoted_from: prototypes/flowweaver_phase5b_temporal_poc payloads + flowweaver_phase5c_runtime_client contracts
    - path: sachima_supervisor/p5_temporal/workflow.py
      provides: StepWorkflow (@workflow.defn) with @workflow.query snapshot and @workflow.update handlers (event-key idempotency)
      promoted_from: prototypes/flowweaver_phase5b_temporal_poc/src/flowweaver_temporal_poc/workflows.py (FlowWeaverTransactionWorkflow)
    - path: sachima_supervisor/p5_temporal/activities.py
      provides: step_activity (@activity.defn) + claim-check validate/deliver activities; Slice 1 body controlled deterministic; refs only
      promoted_from: prototypes/flowweaver_phase5b_temporal_poc/src/flowweaver_temporal_poc/activities.py
    - path: sachima_supervisor/p5_temporal/runtime_client.py
      provides: P5TemporalRuntimeClient (start/query/update/cancel/recover/close; duplicate-start reconcile)
      promoted_from: prototypes/flowweaver_phase5c_runtime_client/src/flowweaver_runtime_client/runtime_client.py (FlowWeaverRuntimeClient)
    - path: sachima_supervisor/p5_temporal/control_surface.py
      provides: P5TemporalControlSurface (safe public dispatcher; sanitized result allowlist; no-throw)
      promoted_from: prototypes/flowweaver_phase5c_runtime_client/src/flowweaver_runtime_client/control_surface.py (FlowWeaverRuntimeControlSurface)
    - path: sachima_supervisor/p5_temporal/step_executor.py
      provides: P5TemporalStepExecutor implementing execute(request, *, role_binding, resolved_inputs) -> StepExecutionOutcome; default-off; delegates to control surface
      promoted_from: new bridge to sachima_supervisor/ai_flow_executor.py StepExecutor Protocol
    - path: sachima_supervisor/p5_temporal/p5_temporal_worker.py
      provides: ops-owned Worker launcher build_step_worker(...) + __main__; registers StepWorkflow + step_activity; polls sachima-p5-step-runtime; never imported by Gateway
      promoted_from: prototypes/flowweaver_phase5b_temporal_poc client bootstrap + phase5h open_real_worker harness
    - path: sachima_supervisor/__init__.py
