    - tests/integration/test_p5_temporal_worker_hermetic_local.py

data_no_leak_policy:
  enforcement: claim_check_by_construction_at_the_contract_boundary
  allowed_in_history: stable codes; mode/phase; caller-owned run/workflow/activity/step refs; role keys; claim-check refs + sha256 digests; artifact/evidence refs + digests; counts/indices/versions; sanitized lease_id/lease_epoch; caller verdict code; cancellation/recovery + active_run_watch markers
  forbidden_in_history: raw prompt/context/model output; raw acpx/ACP/agent stdout; exception text/tracebacks; PIDs/thread ids/host names; platform private ids/card JSON/message ids; media bytes/private paths; tokens/credentials/secrets/connection strings/signed URLs; delivery payloads/IM bodies
  scan_1_json_projection: sanitized durable records / query snapshots / evidence JSON contain only allowed fields
  scan_2_serialized_event_history_bytes: real Temporal history scanned as history.to_json() AND each event SerializeToString(); any forbidden material is runtime_history_leak_detected (kill criterion)

temporal_semantics:
  start: temporalio start_workflow with deterministic workflow_id; WorkflowAlreadyStartedError -> query+reconcile -> idempotent_replay or start_conflict/invalid_start_payload
  query: '@workflow.query snapshot; read-only deterministic; not_found/query_unavailable on miss'
  update: '@workflow.update handlers with event-key idempotency; replay -> duplicate; stale/invalid -> stale/update_rejected'
  cancel: between-step may be deterministic; active-run best-effort/WATCH held cancel_ambiguous + active_run_watch, never promoted to cancelled
  recover: workflow resumes from durable history on next Worker poll; caller reattaches by workflow_id and reconciles; recover_ambiguous on doubt; no second execution
  close: terminal -> closed; re-close -> already_terminal
  duplicate_start: mismatched observable payload -> invalid_start_payload, no double-launch (phase5h proven)
  restart_recovery: Worker drop + fresh Worker on same task queue resumes from history; no duplicate execution

pr_b_tests_gates:
  pr_b_merge_blocker: hermetic_local_temporal_suite
  staging_is_merge_blocker: false
  gates:
    - unit (injected/time-skipping temporal client; no-throw; stable codes; default-off guard)
    - static (ruff, compileall, git diff --check)
    - integration_hermetic_local_real_worker (WorkflowEnvironment.start_time_skipping and/or temporal server start-dev; namespace sachima-p5-local)
    - no_leak_scan_1_json_projection
    - no_leak_scan_2_serialized_event_history_bytes
    - duplicate_start (invalid_start_payload, no second execution; idempotent_replay on match)
    - recovery_restart_replay (Worker drop + fresh Worker; no double-launch; consistent reattach snapshot)
    - gateway_boundary_static_test (no Gateway/message-path import of p5_temporal_worker / Worker builder / service lifecycle / subprocess / socket)
    - determinism_replay (Temporal Replayer/replay_workflow_history; non-determinism fails)
    - wp3b_active_run_cancellation_watch_preserved
    - full_supervisor_suite + sync_roadmap_status --check + forbidden-surface/secret/stale-status scans + Codex primary blocker review BLOCKERS None

rollout_plan:
  - stage: 0
    name: pr_a_docs_only
    namespace: none
    runtime: none
  - stage: 1
    name: local_dev_and_ci_hermetic
    namespace: sachima-p5-local
    runtime: WorkflowEnvironment / temporal server start-dev; real Worker; controlled deterministic step body
    pr_b_merge_gate: true
  - stage: 2
    name: staging_namespace
    namespace: sachima-p5-staging
    runtime: ops-owned Worker; 30-day retention; bounded controlled deterministic runs
    track: parallel_ops_canary
    pr_b_merge_gate: false
  - stage: 3
    name: production_shadow_canary
    namespace: sachima-p5-prod
    approval: separate_future_gate
    enabled: false
  - stage: 4
    name: limited_enablement
    approval: separate_future_gate
    enabled: false

health_kill_switch_rollback:
  worker_health_signals:
    - temporal task-queue describe --task-queue sachima-p5-step-runtime
    - workflow/activity poll success + latency; sticky-cache hit rate; Worker build-id/identity
    - pending-activity / pending-workflow-task counts; open vs closed workflow counts per namespace
  kill_switch:
    - default-off P5TemporalStepExecutor enable flag; off -> WP4 orchestrator falls back to P5LocalOfflineRuntimeAdapter; no Temporal call from caller
    - ops stop/drain Worker; nothing executes even if a workflow is started
    - gateway_cannot_defeat_kill_switch: true
  rollback_commands_staging_only:
    - SIGTERM to p5_temporal_worker.py launcher (graceful poll stop / drain)
    - repoint caller executor to P5LocalOfflineRuntimeAdapter
    - temporal workflow list/terminate/cancel --namespace sachima-p5-staging (scoped)
    - redeploy prior Worker build-id
    - production_namespace_never_touched: true
  stable_failure_classes:
    - runtime_disabled
    - runtime_approval_mismatch
    - runtime_backend_unavailable
    - runtime_operation_timeout
    - runtime_query_unavailable
    - runtime_idempotency_conflict
    - runtime_claim_conflict
    - runtime_stale_state
    - runtime_lease_lost
    - runtime_toctou_conflict
    - runtime_retry_ambiguous
    - runtime_recover_ambiguous
    - runtime_cancel_not_confirmed
    - runtime_precondition_unmet
    - runtime_budget_exceeded
    - runtime_history_leak_detected
    - runtime_not_found
    - runtime_terminalized

