boundaries_carried_into_next_pr:
  - "no live / default-on behavior"
  - "no Gateway-owned lifecycle and no Gateway involvement or mutation"
  - "no Feishu/IM delivery, public ingress, production config, service restart/reload, platform adapter mutation, or real delivery"
  - "no controlled AI FLOW real execution (P6 stays blocked until P5 durable-runtime evidence passes)"
  - "no write-capable roles (read-only role keys only)"
  - "no additional AGENT/acpx/npx real invocation"
  - "external Temporal/Worker lifecycle remains separately unapproved"

preserved_p5_safety_constraints_from_pr147:
  - "caller-owned control surface; Gateway never owns/auto-starts a runtime/Worker/service/socket/subprocess"
  - "cross-process transactional claim store required for durable claims; in-process CAS (AiFlowRunStore in ai_flow_store.py) insufficient (kill-criterion K2)"
  - "no-throw stable result/error taxonomy; backend exceptions collapse to a stable error_code, never crossing the boundary"
  - "runtime-history no-leak: SCAN 1 (sanitized JSON projection) AND SCAN 2 (serialized event/history bytes); payloads cross the seam by claim-check ref/digest only"
  - "probes: duplicate-start, retry, timeout, cancellation, recovery, restart/replay, query-snapshot consistency"
  - "WP3b active-run cancellation WATCH must not be overclaimed; unconfirmed active-run interruption held cancel_ambiguous + active_run_watch marker, never promoted to cancelled, no artifact propagation, no relaunch"

allowed_future_code_shape_design_labels_only:
  - "small caller-owned adapter API / module behind the StepExecutor Protocol seam (a StepExecutor binding plus a thin adapter entry), default-off and injected"
  - "sanitized request/result dataclasses or equivalent (aligned with the existing frozen StepExecutionOutcome: stable codes/refs/digests/counts; never raw bodies; no executor-set business verdict)"
  - "transactional claim-store abstraction with a deterministic local/offline fake implementation for tests only, mirroring the AiFlowRunStore check-and-set / validate-on-read contract while modeling the cross-process claim semantics PR #147 requires"
  - "query/recovery/cancel/close wrappers that return stable codes and never throw across the boundary, reusing the WP3b-aligned cancellation channel (interrupted / cleanup_verified / ambiguous)"

required_future_implementation_tests:
  - "exact approval token: wrong/missing implementation token fails closed"
  - "duplicate start: two identical starts converge to one run (idempotent_replay)"
  - "idempotent replay: compatible repeat returns the stored projection with no second executor call"
  - "conflict fail-closed: incompatible repeat / conflicting starter fails closed (no double-launch)"
  - "unsafe material rejection: platform/private/secret/raw/card/media material rejected (runtime_unsafe_material)"
  - "resident dirty state rejection / sanitization: hostile resident record can never be projected (validate-on-read)"
  - "lease / epoch / state_version TOCTOU: drift between validation and durable apply fails closed before mutation"
  - "active-run cancellation WATCH: unconfirmed active-run interruption held cancel_ambiguous + WATCH, never cancelled"
  - "no-leak scans: SCAN 1 (JSON projection) AND SCAN 2 (serialized event/history bytes)"
  - "forbidden-surface static guard: the adapter imports/starts no real runtime/Worker/subprocess/socket/acpx/npx surface"

