architecture_contract:
  workflow_spec: "caller-owned schema-versioned static graph"
  first_shape: "bounded linear read-only multi-step flow such as architect -> programmer_candidate(read-only) -> reviewer"
  successor_policy: "declared graph edges only; role output never chooses successor"
  role_policy: "existing read-only role bindings only; bind-time and execution-time capability gates"
  gate_policy: "workflow admission, pre-step, post-step, and terminal operator gates; fail closed on missing/ambiguous gate"
  artifact_policy: "claim-check refs and digests in durable state; raw artifact bodies remain out of durable state and operator projection"
  idempotency_policy: "per-step fingerprint over run, step, spec digest, role binding digest, input artifact digests, approval ref, and attempt index"
  cancellation_policy: "between-step cancel deterministic; active-run cancel best-effort/WATCH inherited from WP3b caveat"
  evidence_policy: "deterministic sanitized packet with spec digest, step transitions, gate decisions, artifact refs/digests, retry/compensation/cancellation summary"

verification_required_before_pr:
