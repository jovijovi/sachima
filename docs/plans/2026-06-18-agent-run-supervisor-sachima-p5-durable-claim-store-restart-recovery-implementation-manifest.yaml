implementation:
  summary: >-
    Adds a caller-supplied local/offline durable claim store for the P5 fake
    runtime adapter. A fresh adapter can restore sanitized completed step records
    from the store and replay/query/recover them without relaunching the fake
    runtime; conflicts and dirty resident store state fail closed before launch.
  files:
    - sachima_supervisor/p5_runtime_adapter.py
    - sachima_supervisor/__init__.py
    - tests/sachima_supervisor/test_p5_runtime_adapter.py
    - docs/plans/2026-06-18-agent-run-supervisor-sachima-p5-durable-claim-store-restart-recovery-implementation.md
    - docs/plans/2026-06-18-agent-run-supervisor-sachima-p5-durable-claim-store-restart-recovery-implementation-manifest.yaml
    - docs/dev_log/2026-06-18-agent-run-supervisor-sachima-p5-durable-claim-store-restart-recovery-implementation.md
    - docs/roadmap/current-status.md
runtime_surface:
  adapter_type: deterministic_fake_injected_local_only
  caller_owned: true
  step_executor_drop_in: true
  default_off: true
  claim_store: local_json_file_caller_supplied
  restart_recovery: sanitized_replay_without_fake_relaunch
  production_durable_runtime: false
  external_lifecycle_owned: false
  real_runtime_or_worker_start: false
controls:
  execute: no_throw_step_execution_outcome
  query: sanitized_snapshot_no_reinvoke
  cancel: active_run_watch_preserving_no_throw_outcome
  recover: sanitized_snapshot_only
  close: sanitized_local_marker
safety_properties:
  duplicate_start_idempotency_after_restart: identical execute calls converge to stored sanitized outcome and zero relaunch in the restarted adapter
  conflict_after_restart: incompatible replay fails closed with runtime_adapter_idempotency_conflict and zero relaunch
  dirty_resident_store: malformed_or_unsafe_store_state_fails_closed_before_launch
  no_leak_serialized_history_bytes: tested
  no_leak_claim_store_file_bytes: tested
  artifact_projection: claim_check_refs_only
  cancellation_watch: unconfirmed active-run cancel returns cancel_ambiguous and active_run_cancellation_watch
