design_labels:
  session_records:
    - "SessionRecord (session_id / activity_ref / role_key / role_file_digest / session_binding / lifecycle_state / lease / state_version / turn_count / open_turn_index / budgets)"
    - "TurnRecord (append-only; turn_index / idempotency_key / request_fingerprint / prompt_ref / status / lease_epoch_at_launch)"
    - "CancellationRequestRecord (cancel_id / target / operator_gate / lease binding / idempotency / reason_code / status)"
  lifecycle_states:
    - "session_requested -> session_validated -> session_opening -> session_open"
    - "session_open <-> session_turn (single in-flight turn)"
    - "session_closing -> session_closed; session_aborting -> session_aborted; any -> session_failed"
    - "cancel_requested -> cancelled | cancel_failed | cancel_ambiguous (design labels; execution not approved)"
  commands:
    - "session_create / session_send / session_query / session_list / session_close / session_abort (design only)"
  concurrency_rules:
    - "lease-internal open-state recheck before any launch (work-starting operations)"
    - "lifecycle guard re-read for close/abort/cancel"
    - "stable lock ordering: store lock -> lifecycle guard -> future supervisor handle; no supervisor call under store lock"
    - "fail-closed on ambiguous prior run/session state; no duplicate launch to resolve ambiguity"
    - "race regression tests required in any future implementation"

