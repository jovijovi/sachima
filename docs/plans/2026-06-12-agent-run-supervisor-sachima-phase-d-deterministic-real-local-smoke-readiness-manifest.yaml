readiness_design_schemes:
  pinned_acpx_binary:
    operator_provisioning: "auditable build; absolute path + binary sha256 + sanitized `acpx --version`; match runner.acpx_version 0.10.0"
    in_gate_verification: "_check_runner_provenance: role-file sha256 binding; non-null absolute whitespace-free non-npx binary; read-only capability"
  committed_role_path_decision: "NO host-local path in committed JSON; use an untracked local-only role overlay via start_controlled_local_exec(role_root=...); committed config stays acpx_binary null + portable placeholder /workspace/sachima"
  prompt_materialization:
    source: "small repo-controlled fixture or deterministic builder (mirrors build_controlled_local_dry_run_evidence); not raw IM/card/media/tool/gateway/env"
    rules: "read-only harmless; bounded; passes _value_is_unsafe and _EXEC_UNSAFE_MARKERS; only digest reaches durable state"
    entry_point: "request carries prompt_ref/digest-safe refs before claim; materialization-aware _build_local_offline_request sets prompt=<materialized> after acquired claim and before invoke_local_offline_supervisor (today hardcodes prompt=None)"
  smoke_request_construction_boundary: "single exec_controlled request; sachima.codex.primary_reviewer only; enabled True + exact token; gates/provenance -> claim/CAS -> materialization-aware seam request -> one invoke_local_offline_supervisor call"
  sanitized_evidence_shape: "durable claim projection over _CLAIM_STATE_KEYS + out-of-PR sanitized smoke evidence via seam evidence_dir/_write_evidence; no raw stdout/stderr/prompt/paths/exceptions"
  replay_no_duplicate_launch: "atomic claim/CAS; first start acquired -> exactly one supervisor invocation; identical replay returns resident projection, zero second launch; conflicts fail closed"
  rollback_cleanup: "delete untracked local role overlay; committed config stays null; ephemeral in-process claim store (no cross-process rollback); no Gateway/config/delivery touched; codegraph uninit + worktree remove if throwaway"
  test_probe_plan: "RED-first materialization + overlay provenance + construction-boundary + replay + evidence no-leak + forbidden-surface tests; real-acpx smoke probe gated behind env marker + pinned binary + installed library, skipped by default"

current_blockers_for_execution:
  - id: "no_pinned_local_acpx"
    detail: "no pinned local acpx executable on PATH at readiness preflight; committed role acpx_binary null; provenance gate fails closed (activity_runner_provenance_unverified)"
  - id: "prompt_materialization_unimplemented"
    detail: "_build_local_offline_request hardcodes prompt=None; empty exec prompt fails closed at the supervisor caller boundary"
  - id: "supervisor_library_absent"
    detail: "agent_run_supervisor not installed in any interpreter on this host; invoke_local_offline_supervisor would raise supervisor_library_unavailable (surfaced by this architecture pass; not in the earlier baseline)"

