  - "agent_run_supervisor library installed and pinned per repo dependency policy"
  - "prompt materialization fixture/builder landed and approved"
  - "real PR #107 durable-state preflight record with held lease + state version"
  - "separate named user approval for the Phase D smoke"
  - "Codex primary review PASS on the smoke branch; local checks + CI green"
  - "sanitized-only evidence plan, out of PR payload; no Gateway/Feishu/live/public ingress"

