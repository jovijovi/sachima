prerequisite_layers:
  pinned_acpx_provenance:
    api: "verify_pinned_local_acpx_binary(binary_path, *, version_probe, expected_version=0.10.0) -> PinnedLocalAcpxProvenance"
    checks: "absolute whitespace-free path; basename rejected by the shared _is_forbidden_runner_basename predicate (case-insensitive FORBIDDEN_RUNNER_BASENAMES membership — npx/npm/pnpm/yarn/bunx/bun/corepack/sh/bash/zsh/dash/ksh/fish/env/node — plus npx-prefix rule), the same predicate the start_controlled_local_exec launch gate enforces; regular executable file; sha256 of executable bytes; injected probe returns sanitized bounded single-line text carrying 0.10.0 as an exact standalone version token (substring hits like 10.10.0 and pre-release/build variants like 0.10.0-dev rejected); expected_version must equal _REQUIRED_ACPX_VERSION"
    failure: "stable activity_runner_provenance_unverified; no raw exception/probe detail"
    invariants: "module never executes the binary; committed role config stays acpx_binary null and untouched; no host path committed"
  prompt_materialization:
    builder: "sachima_supervisor/smoke_prompt.py::build_phase_d_smoke_prompt (deterministic; prompt_ref phase_d_smoke_prompt_v1; sha256 digest; bounded; safety-screened)"
    fixture: "tests/fixtures/sachima_supervisor/phase_d_smoke_prompt.v1.txt (byte-for-byte mirror of the builder prompt)"
    seam: "start_controlled_local_exec(..., prompt_materializer=None); default keeps Phase C prompt=None; injected materializer runs after acquired claim and before the single supervisor call; screened output lives only in the in-memory seam request"
    failure: "raising/non-str/empty/oversized/unsafe materialization finalizes failed_terminal with stable activity_prompt_materialization_failed and zero supervisor invocations"
    invariants: "_CLAIM_STATE_KEYS unchanged; raw prompt never in durable state/fingerprint/query; replay never rematerializes or relaunches"
  supervisor_library_pin:
    api: "check_supervisor_library_pin(*, expected_version=0.0.0, import_probe=None, version_probe=None) -> SupervisorLibraryPinStatus"
    expected_pin: "0.0.0 (current agent-run-supervisor repo pyproject version)"
    failure_codes:
      - "supervisor_library_expected_version_invalid"
      - "supervisor_library_unavailable"
      - "supervisor_library_version_unknown"
      - "supervisor_library_version_mismatch"
    invariants: "never raises; unsanitary observed versions dropped, not echoed; injected probes in tests; agent-run-supervisor deliberately NOT added to pyproject dependencies — install/pin stays an operator provisioning step under the repo exact-pin policy"

