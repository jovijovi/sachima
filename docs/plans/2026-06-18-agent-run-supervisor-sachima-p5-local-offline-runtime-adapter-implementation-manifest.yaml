implementation:
  summary: >-
    Adds a default-off, caller-owned, local/offline fake runtime adapter behind
    the WP4 StepExecutor Protocol seam. The adapter returns sanitized
    StepExecutionOutcome projections, keeps raw material out of history and
    artifact refs, supports no-throw query/cancel/recover/close controls, and
    preserves active-run cancellation WATCH semantics.
  files:
    - sachima_supervisor/p5_runtime_adapter.py
    - sachima_supervisor/__init__.py
    - tests/sachima_supervisor/test_p5_runtime_adapter.py
    - docs/plans/2026-06-18-agent-run-supervisor-sachima-p5-local-offline-runtime-adapter-implementation.md
    - docs/plans/2026-06-18-agent-run-supervisor-sachima-p5-local-offline-runtime-adapter-implementation-manifest.yaml
    - docs/dev_log/2026-06-18-agent-run-supervisor-sachima-p5-local-offline-runtime-adapter-implementation.md
    - docs/roadmap/current-status.md
