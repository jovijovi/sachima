type: sachima.governance.phase_manifest.v1
phase: s4_read_only_real_agent_step_design_packet
status: design_candidate
title: "Sachima S4 — Read-only real-agent step design packet"
date: 2026-07-01

base_branch: release/sachima
branch: docs/s4-read-only-real-agent-step-design

summary: >-
  Docs/status design packet refining the future S4 read-only real-agent step
  implementation. It fixes how the already-merged Temporal Activity body and
  caller-owned controller (S3), over the merged S2 local/offline supervisor-adapter
  seam, would bind a bounded, single, read-only REAL agent step through the merged
  agent-run-supervisor controlled-exec wall (pinned-local acpx exec) in place of the
  injected fake body — without changing the Activity/adapter contract, the
  claim-check data model, the closed role mapping, the stable ids/codes, the
  duplicate/recover/no-relaunch map, the Temporal-history no-leak boundary, or the
  ops-owned Worker/task-queue ownership. It also fixes the real-agent side-effect
  idempotency (pre-claim/post-claim/duplicate/recover/no-relaunch/ambiguous) and the
  Temporal Activity retry/timeout/heartbeat/cancellation/failure semantics (Temporal
  behavior governed by https://docs.temporal.io/ as source of truth; local llm-wiki
  is dated synthesis only). Docs only: no source implementation, no Temporal
  Worker/runtime start, no real agent/acpx/npx execution by this gate, no
  Gateway/Feishu/live behavior, no real send, no production config, no write roles.

governance_markers:
  - DESIGN_ONLY
  - IMPLEMENTATION_NOT_APPROVED
  - LIVE_NOT_APPROVED
  - GATEWAY_NOT_APPROVED
  - REAL_DELIVERY_NOT_APPROVED
  - TEMPORAL_WORKER_START_NOT_APPROVED
  - REAL_AGENT_EXECUTION_NOT_APPROVED_BY_THIS_GATE
  - WRITE_ROLES_NOT_APPROVED
  - PRODUCTION_CONFIG_NOT_APPROVED

