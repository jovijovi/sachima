implementation:
  summary: >-
    Adds a small, default-off P6-B Stage-2 host-local definition-of-ready surface. It (1)
    pins/validates a host-local runner + role overlay + artifact-sink + evidence-root shape
    without launching a real agent, returning a controlled BLOCKED report when exact runner
    parameters are absent/missing/unpinned, and (2) proves the current in-process P6-B path is
    fail-closed after a simulated crash/restart: over a fresh empty ControlledLocalExecClaimStore
    and a raising/counting supervisor invoker, recover/query by run/step return not_found /
    reattached_no_relaunch with a zero launch count and execute is never called. It reuses the
    merged P6-B bridge and controlled-exec walls unmodified and builds no runner.
  files:
    - sachima_supervisor/p6b_host_local_dor.py
    - tools/p6b_host_local_dor.py
    - tests/sachima_supervisor/p6b_host_local_dor/**
    - docs/plans/2026-06-27-agent-run-supervisor-sachima-p6b-stage2-host-local-dor-crash-no-relaunch-proof-implementation.md
    - docs/plans/2026-06-27-agent-run-supervisor-sachima-p6b-stage2-host-local-dor-crash-no-relaunch-proof-implementation-manifest.yaml
