state_machine:
  precondition: "prior cancel_requested record from request_cancellation() for the same cancel_id and same interrupt target"
  missing_or_mismatched_prior_cancel_record: "activity_not_found before fake; zero fake calls"
  finalization_guard: "re-read resident cancel before finalizing; changed/ambiguous in-flight state stays activity_cancel_ambiguous"
  same_cancel_id_new_cancellation_idempotency: "matching fingerprint replays existing durable record; cannot reopen cancelled/cancel_ambiguous"
  outcome_mapping:
    interrupted_true_and_cleanup_verified_true: "cancelled (ok=true; evidence carried; no error_code)"
    interrupted_false: "cancel_failed / activity_supervisor_failed"
    interrupted_true_cleanup_unverified: "cancel_ambiguous / activity_cancel_ambiguous (held fail-closed)"
    ambiguous_flag_set: "cancel_ambiguous / activity_cancel_ambiguous (held fail-closed)"
    unsafe_or_unsanitizable_outcome: "cancel_ambiguous / activity_cancel_ambiguous (held fail-closed)"
    fake_raised_exception_none_outcome: "cancel_ambiguous / activity_cancel_ambiguous (held fail-closed)"
  idempotency:
    map: "SessionLifecycleStore._interrupt_idem"
    same_fingerprint_replay: "returns existing terminal state"
    fingerprint_mismatch: "activity_idempotency_conflict"
    replay_on_in_progress_cancel_interrupting: "activity_cancel_ambiguous fail-closed"

