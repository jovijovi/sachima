runtime_ownership:
  owner: "Sachima / FlowWeaver (the caller)"
  owns:
    - "durable runtime choice and lifecycle"
    - "caller-supplied control surface"
    - "durable run/workflow/activity/session/step state, leases, epochs, state_version"
    - "idempotency, cross-process transactional claim store"
    - "retry/update/cancel/recover/close policy, role mapping, business verdict"
  supervisor_library: "calls the control surface via the existing executor Protocol seam; owns local internals/redacted evidence only; never owns the runtime lifecycle/claim store/verdict"
  gateway: "NEVER a caller, runtime owner, lifecycle owner, Worker host, renderer, or delivery surface; never owns or auto-starts a Temporal/Worker/service/socket/subprocess lifecycle"
  runtime_kind: "future caller-supplied abstraction (Temporal or equivalent); design label only; not started or owned here"

control_surface_operations:
  - { op: "start", result_codes: ["started", "idempotent_replay", "start_conflict"] }
  - { op: "query", result_codes: ["query_ok", "not_found", "query_unavailable"] }
  - { op: "update", result_codes: ["update_applied", "update_rejected", "stale", "not_found"] }
  - { op: "cancel", result_codes: ["cancel_requested", "cancelled", "cancel_failed", "cancel_ambiguous"] }
  - { op: "recover", result_codes: ["recovered", "recover_ambiguous", "not_found"] }
  - { op: "close_terminalize", result_codes: ["closed", "already_terminal"] }

durable_records:
  - "RuntimeRunRecord (run_id / runtime_kind / workflow_type_ref / run_ref / status / state_version / lease / idempotency_key / attempt_count / artifact_ref_count / evidence_ref+digest / caller_verdict / error_code / retryable)"
  - "WorkflowRecord (run_id / workflow_spec_digest / step ids+edges refs / bounds / status)"
  - "ActivityRecord (activity_id / role_key / mode+phase / status / lease+epoch / idempotency / evidence_ref+digest / error_code)"
  - "SessionRecord (design label only; persistent-session execution separately gated)"
  - "StepAttemptRecord (append-only: step_id / attempt_index / idempotency_key / request_fingerprint / role_binding_digest / input_artifact_digests / outcome_status / error_code / evidence_ref / lease_epoch_at_launch)"
  - "lease / epoch / state_version (cross-process ownership + optimistic concurrency)"
  - "idempotency_key (exactly-once binding; cross-process duplicate-start convergence)"
  - "QuerySnapshotRecord (snapshot_id / snapshot_version / run+step statuses / counts / refs+digests / cancellation+recovery markers / WATCH marker)"
  - "CancellationRecord (cancel_id / target / operator_gate_ref / lease binding / idempotency / reason_code / status / active_run_watch marker)"
  - "RecoveryRecord (recovery_id / run_ref / recovered_state_version / epoch_at_recovery / reconciliation_outcome / divergence_code / operator_gate_ref)"
  - "ArtifactRef (artifact_id / producer_step_id / content_digest / artifact_kind / byte_count) claim-check only"

cross_process_claim_store:
  required_for_implementation: true
  in_process_cas_sufficient: false
  in_process_cas_reference: "sachima_supervisor/ai_flow_store.py (single-process, lock-guarded mutex CAS)"
  requirements:
    - "atomic claim / check-and-set across processes (not a thread mutex)"
    - "durability across process restart"
    - "isolation sufficient to serialize conflicting claims"
    - "claim record bound to (run_id, idempotency_key, request_fingerprint, lease_epoch)"
    - "fail-closed on conflict; identical concurrent starts launch exactly once"
    - "recovery-safe reads before start/replay/recover"
  rule: "the in-process CAS may not be presented as evidence of durable cross-process claim correctness (kill-criterion K2)"

no_throw_boundary:
  every_operation_no_throw: true
  result_fields: ["status_code", "error_code", "run_ref", "snapshot_ref", "retryable"]
  rule: "no exception/traceback/PID/backend detail crosses the boundary; raw detail collapses to a stable error_code"

failure_taxonomy:
  - "runtime_disabled"
  - "runtime_approval_mismatch"
  - "runtime_unsupported_op"
  - "runtime_unknown_role"
  - "runtime_unsafe_material"
  - "runtime_idempotency_conflict"
  - "runtime_stale_state"
  - "runtime_lease_lost"
  - "runtime_toctou_conflict"
  - "runtime_claim_conflict"
  - "runtime_retry_ambiguous"
  - "runtime_recover_ambiguous"
  - "runtime_cancel_not_confirmed"
  - "runtime_precondition_unmet"
  - "runtime_budget_exceeded"
  - "runtime_backend_unavailable"
  - "runtime_operation_timeout"
  - "runtime_query_unavailable"
  - "runtime_history_leak_detected"
  - "runtime_not_found"
  - "runtime_terminalized"

runtime_history_no_leak:
  allowed: "stable codes, mode/phase, caller-owned refs, role keys, claim-check refs+sha256 digests, artifact/evidence refs+digests, counts/indices/versions, sanitized lease_id/lease_epoch, caller verdict code, recovery/cancellation+WATCH markers"
  forbidden: "raw prompt/context/model/tool output, raw acpx/ACP stdout, exception text/tracebacks, PIDs/thread ids/host names, platform private ids/card JSON/message ids, media bytes/private paths, tokens/credentials/secrets/connection strings/signed URLs, delivery payloads/IM bodies"
  required_scans:
    scan_1_json_projection: "sanitized durable records / query snapshots / evidence JSON contain only allowed fields"
    scan_2_serialized_event_history_bytes: "the caller-supplied runtime's serialized event history / workflow-state bytes contain no forbidden material; a leak is runtime_history_leak_detected (kill-criterion K3)"

required_probes:
  - "duplicate_start"
  - "retry"
  - "timeout"
  - "cancellation"
  - "recovery"
  - "restart_replay"
  - "query_snapshot_consistency"
probes_run_by_this_pr: false

wp3b_active_run_cancellation_watch:
  carried_forward: true
  pr_number: 140
  merge_commit: "3fe18ab9451d290a70036697da118351d604be27"
  between_step_cancel: "may be deterministic"
  active_run_cancel: "best-effort / WATCH; unconfirmed interruption held cancel_ambiguous with active_run_watch marker; never promoted to cancelled; no artifact propagation; no relaunch"
  must_not_overclaim: true

relationship:
  wp4_design_pr: 142
  wp4_design_merge_commit: "bb5e5d9bf707fde7934939cc473544511bd65ffd"
  wp4_implementation_pr: 145
