  wp4_meaning: "local/offline injected-fakes-only controlled AI FLOW orchestrator; in-process CAS; executor Protocol seam with no real runner"
  p5_meaning: "produces durable runtime evidence (probes) by attaching a caller-supplied durable runtime behind the control surface; design/readiness only in this packet"
  p6_meaning: "controlled AI FLOW execution; BLOCKED until P5 durable runtime evidence passes"

scoring_rubric:
  scale: "0 absent/unsafe, 1 partial, 2 complete & proven"
  pass_threshold: ">= 18/20 AND no dimension at 0 AND no kill-criterion triggered"
  dimensions:
    - "runtime ownership boundary"
    - "control-surface completeness"
    - "cross-process claim correctness"
    - "idempotency & replay"
    - "recovery / restart"
    - "query snapshot consistency"
    - "cancellation honesty (WP3b WATCH)"
    - "no-throw & failure taxonomy"
    - "runtime-history no-leak (scan 1 + scan 2)"
    - "evidence determinism"

kill_criteria:
  - "K1 Gateway/Worker/message-handling path owns or auto-starts a Temporal/Worker/service/socket/subprocess runtime lifecycle"
  - "K2 durable claim relies on the in-process mutex CAS instead of a cross-process transactional claim store"
  - "K3 raw material in durable records/snapshots/evidence OR serialized event/history bytes (scan 2 fails)"
  - "K4 active-run cancellation recorded as clean cancelled without confirmed interruption (WP3b WATCH overclaimed)"
  - "K5 restart/replay/duplicate start causes a second real execution (double-launch)"
  - "K6 a control-surface operation raises across the boundary or leaks a backend exception/traceback"
  - "K7 controlled AI FLOW execution / write roles / additional AGENT-acpx-npx / live / Gateway / Feishu / public ingress / production config / real delivery introduced under cover of P5"
  - "K8 external Temporal/Worker service lifecycle started without its own separate approval token"

implementation_gates:
  - "G0 separate exact implementation approval token present; external Temporal/Worker lifecycle needs its own token"
  - "G1 local caller-owned runtime adapter behind the executor Protocol seam; default-off; Gateway excluded"
  - "G2 cross-process transactional claim store implemented and proven; in-process CAS retired for durable claims"
  - "G3 control surface implemented as no-throw wrappers with the stable failure taxonomy"
  - "G4 durable records + lease/epoch/state_version + idempotency + claim-check artifact refs persisted sanitized"
  - "G5 runtime-history no-leak enforced by construction and verified by scan 1 + scan 2"
  - "G6 all seven probes pass with deterministic sanitized evidence outside the repo"
  - "G7 WP3b active-run cancellation WATCH preserved in records, probes, and evidence"
  - "G8 local verification + Codex primary blocker review BLOCKERS: None; roadmap dashboard updated"

